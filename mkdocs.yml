site_name: CASBOT2 二次开发文档
site_description: CASBOT2 人形机器人 ROS2 二次开发指南
site_url: https://casbot02.readthedocs.io
repo_url: https://github.com/ElvinChan777/casbot02-docs
repo_name: ElvinChan777/casbot02-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换至暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换至亮色模式
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 3
  - git-revision-date-localized:
      type: datetime
      locale: zh

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - admonition
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - snippets
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/extra.css

extra:
  version:
    provider: mike

nav:
  - 首页: index.md
  - 快速开始:
    - 环境准备: getting-started/environment.md
    - 五分钟上手: getting-started/quickstart.md
    - 消息包使用指南: getting-started/message-package.md
  - 开发指南:
    - 接口总览: guide/overview.md
    - 模式与状态: guide/mode-and-state.md
    - 运动控制: guide/motion-control.md
    - 语音交互: guide/voice.md
    - 技能与动作: guide/skills.md
    - 传感器数据: guide/sensors.md
  - API 参考:
    - 消息类型 (msg): api/messages/index.md
    - 服务类型 (srv): api/services/index.md
    - 动作类型 (action): api/actions/index.md
  - 示例与场景:
    - 示例总览: examples/demos/overview.md
    - 接口全覆盖工具: examples/demos/all-interfaces.md
    - 开机自检: examples/scenarios/boot-check.md
    - 仿真联调: examples/scenarios/simulation.md
    - 实机联调: examples/scenarios/real-robot.md
  - 发布说明: changelog.md
